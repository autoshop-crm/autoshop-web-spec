server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 302 /crm/;
    }

    location /crm/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /crm/ {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        return 404;
    }
}
